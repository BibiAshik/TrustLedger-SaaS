<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Trust Ledger</title>
    <link rel="icon" href="/images/favicon.png" type="image/png">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/auth.css">
    <link rel="stylesheet" href="/css/forms.css">
</head>
<body>
    <div class="customer-login-page">
        <div class="customer-login-card">
            <div class="logo">
                <img src="/images/logo-light.png" alt="Trust Ledger">
            </div>
            <h2>Forgot Password</h2>
            <p class="subtitle">Enter your shop owner email address. If it exists, a reset token will be generated.</p>

            <form onsubmit="handleForgotPassword(event)">
                <div class="form-group" style="text-align:left;">
                    <label for="forgotEmail">Email Address</label>
                    <input type="email" id="forgotEmail" class="form-input" placeholder="you@example.com" required>
                </div>
                <button type="submit" class="btn btn-gold btn-block btn-lg mt-4">Send Reset Link</button>
            </form>

            <div style="margin-top: var(--space-6); padding-top: var(--space-4); border-top: 1px solid var(--gray-200);">
                <a href="/" class="text-sm" style="color: var(--gray-500);">Back to Trust Ledger</a>
            </div>
        </div>
    </div>

    <script src="/js/common.js"></script>
    <script src="/js/auth.js"></script>
</body>
</html>
