<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Trust Ledger</title>
    <link rel="icon" href="/images/favicon.png" type="image/png">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/auth.css">
    <link rel="stylesheet" href="/css/forms.css">
</head>
<body>
    <div class="customer-login-page">
        <div class="customer-login-card">
            <div class="logo">
                <img src="/images/logo-dark.png" alt="Trust Ledger">
            </div>
            <h2>Reset Password</h2>
            <p class="subtitle">Enter a new password for your Trust Ledger account.</p>

            <form onsubmit="handleResetPassword(event)">
                <div class="form-group" style="text-align:left;">
                    <label for="newPassword">New Password</label>
                    <input type="password" id="newPassword" class="form-input" minlength="6" required>
                </div>
                <div class="form-group" style="text-align:left;">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" class="form-input" minlength="6" required>
                </div>
                <button type="submit" class="btn btn-gold btn-block btn-lg mt-4">Reset Password</button>
            </form>

            <div style="margin-top: var(--space-6); padding-top: var(--space-4); border-top: 1px solid var(--gray-200);">
                <a href="/" class="text-sm" style="color: var(--gray-500);">Back to Trust Ledger</a>
            </div>
        </div>
    </div>

    <script src="/js/common.js"></script>
    <script>
        async function handleResetPassword(event) {
            event.preventDefault();

            var token = new URLSearchParams(window.location.search).get('token');
            var newPassword = document.getElementById('newPassword').value;
            var confirmPassword = document.getElementById('confirmPassword').value;
            var submitBtn = event.target.querySelector('button[type="submit"]');

            if (!token) {
                showToast('Password reset token is missing. Please request a new link.', 'danger');
                return;
            }
            if (newPassword !== confirmPassword) {
                showToast('Passwords do not match.', 'warning');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner"></span> Resetting...';

            try {
                var data = await publicApiCall('/api/auth/reset-password', 'POST', {
                    token: token,
                    newPassword: newPassword
                });
                showToast(data.message || 'Password reset successful.', 'success');
                setTimeout(function() {
                    window.location.href = '/';
                }, 1500);
            } catch (error) {
                showToast(error.message || 'Failed to reset password.', 'danger');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Reset Password';
            }
        }
    </script>
</body>
</html>
