<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile — Trust Ledger</title>
    <link rel="icon" href="/images/favicon.png" type="image/png">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="/css/forms.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand"><img src="/images/logo-light.png" alt="Trust Ledger"><span>My Loans</span></div>
        <div class="navbar-menu"><button onclick="logout()">Logout</button></div>
    </nav>

    <div class="dashboard-layout">
        <aside class="sidebar">
            <nav class="sidebar-nav">
                <div class="sidebar-section-title">My Account</div>
                <a href="/customer/dashboard"><span class="nav-icon">📊</span> My Loans</a>
                <a href="/customer/payment-history"><span class="nav-icon">📜</span> Payment History</a>
                <a href="/customer/profile" class="active"><span class="nav-icon">👤</span> Profile</a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <h1>👤 My Profile</h1>
            </div>

            <div id="profileContent">
                <div class="loading-overlay"><div class="spinner spinner-lg"></div><p>Loading profile...</p></div>
            </div>
        </main>
    </div>

    <nav class="bottom-nav">
        <div class="bottom-nav-items">
            <a href="/customer/dashboard" class="bottom-nav-item"><span class="nav-icon">📊</span> Loans</a>
            <a href="/customer/payment-history" class="bottom-nav-item"><span class="nav-icon">📜</span> History</a>
            <a href="/customer/profile" class="bottom-nav-item active"><span class="nav-icon">👤</span> Profile</a>
        </div>
    </nav>

    <script src="/js/common.js"></script>
    <script>
        if (!requireAuth()) { /* redirects */ }

        async function loadProfile() {
            try {
                var data = await apiCall('/api/customer/profile', 'GET');
                renderProfile(data);
            } catch (error) {
                showToast('Failed to load profile.', 'danger');
            }
        }

        function renderProfile(customer) {
            var html = '';

            // Profile card
            html += '<div class="card mb-6" style="text-align:center;padding:var(--space-10);">';
            html += '<h2 style="margin-bottom:var(--space-1);">' + customer.fullName + '</h2>';
            html += '<p class="text-muted">' + customer.phone + ' · ' + customer.email + '</p>';
            html += '</div>';

            // Details
            html += '<div class="card mb-6"><div class="card-header"><h3>Personal Information</h3></div>';
            html += '<div class="detail-grid">';
            html += '<div class="detail-group"><div class="detail-label">Full Name</div><div class="detail-value">' + customer.fullName + '</div></div>';
            html += '<div class="detail-group"><div class="detail-label">Phone</div><div class="detail-value">' + customer.phone + '</div></div>';
            html += '<div class="detail-group"><div class="detail-label">Email</div><div class="detail-value">' + customer.email + '</div></div>';
            html += '<div class="detail-group"><div class="detail-label">Date of Birth</div><div class="detail-value">' + formatDate(customer.dateOfBirth) + '</div></div>';
            html += '<div class="detail-group"><div class="detail-label">Gender</div><div class="detail-value">' + (customer.gender || '—') + '</div></div>';
            html += '<div class="detail-group"><div class="detail-label">Address</div><div class="detail-value">' + customer.address + '</div></div>';
            html += '<div class="detail-group"><div class="detail-label">Aadhaar</div><div class="detail-value">' + (customer.maskedAadhaarNumber || 'XXXX XXXX XXXX') + '</div></div>';
            html += '</div></div>';

            // Change password
            html += '<div class="card"><div class="card-header"><h3>🔑 Change Password</h3></div>';
            html += '<form onsubmit="changeCustomerPassword(event)" style="max-width:400px;">';
            html += '<div class="form-group"><label>Current Password</label><input type="password" id="currentPwd" class="form-input" required></div>';
            html += '<div class="form-group"><label>New Password</label><input type="password" id="newPwd" class="form-input" minlength="6" required></div>';
            html += '<button type="submit" class="btn btn-navy">Update Password</button></form></div>';

            document.getElementById('profileContent').innerHTML = html;
        }

        async function changeCustomerPassword(event) {
            event.preventDefault();
            try {
                await apiCall('/api/auth/change-password', 'POST', {
                    currentPassword: document.getElementById('currentPwd').value,
                    newPassword: document.getElementById('newPwd').value
                });
                showToast('Password updated!', 'success');
                document.getElementById('currentPwd').value = '';
                document.getElementById('newPwd').value = '';
            } catch (error) {
                showToast('Failed to change password.', 'danger');
            }
        }

        loadProfile();
    </script>
</body>
</html>
