<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Login — Trust Ledger</title>
    <meta name="description" content="Login to your Trust Ledger customer portal to view loans and make payments.">
    <link rel="icon" href="/images/favicon.png" type="image/png">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/auth.css">
    <link rel="stylesheet" href="/css/forms.css">
</head>
<body>

    <div class="customer-login-page">
        <div class="customer-login-card">
            <div class="logo">
                <img src="/images/logo-light.png" alt="Trust Ledger">
            </div>
            <h2>Customer Login</h2>
            <p class="subtitle">Enter your phone number or email to access your loan details</p>

            <!-- Login Form -->
            <div id="customerLoginForm">
                <form onsubmit="handleCustomerLogin(event)">
                    <div class="form-group" style="text-align: left;">
                        <label for="customerIdentifier">Phone Number or Email</label>
                        <input type="text" id="customerIdentifier" class="form-input"
                               placeholder="10-digit phone or email address" required>
                        <p class="form-help">Enter your 10-digit phone number or email address</p>
                    </div>
                    <div class="form-group" style="text-align: left;">
                        <label for="customerPassword">Password</label>
                        <input type="password" id="customerPassword" class="form-input"
                               placeholder="Enter your password" required>
                    </div>
                    <div id="customerLoginError" class="error-message"></div>
                    <button type="submit" class="btn btn-gold btn-block btn-lg mt-4">Login</button>
                </form>
            </div>

            <!-- Shop Selection (shown when multiple shops match — section 6.6) -->
            <div id="shopSelection" style="display: none;"></div>

            <div style="margin-top: var(--space-6); padding-top: var(--space-4); border-top: 1px solid var(--gray-200);">
                <a href="/" class="text-sm" style="color: var(--gray-500);">← Back to Trust Ledger</a>
            </div>
        </div>
    </div>

    <script src="/js/common.js"></script>
    <script src="/js/auth.js"></script>
</body>
</html>
