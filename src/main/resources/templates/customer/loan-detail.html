<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Detail — Trust Ledger</title>
    <link rel="icon" href="/images/favicon.png" type="image/png">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="/css/tables.css">
    <link rel="stylesheet" href="/css/customer-theme.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand"><img src="/images/logo-light.png" alt="Trust Ledger"><span>My Loans</span></div>
        <div class="navbar-menu"><button class="btn btn-outline" onclick="logout()">Logout</button></div>
    </nav>

    <div class="dashboard-layout">
        <aside class="sidebar">
            <nav class="sidebar-nav">
                <div class="sidebar-section-title">My Account</div>
                <a href="/customer/dashboard" class="active">My Loans</a>
                <a href="/customer/payment-history">Payment History</a>
                <a href="/customer/profile">Profile</a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <div>
                    <a href="/customer/dashboard" class="text-sm" style="color:var(--gray-500);">← Back to My Loans</a>
                    <h1>Loan Detail</h1>
                </div>
            </div>

            <div id="customerLoanDetail">
                <div class="loading-overlay"><div class="spinner spinner-lg"></div><p>Loading...</p></div>
            </div>
        </main>
    </div>

    <nav class="bottom-nav">
        <div class="bottom-nav-items">
            <a href="/customer/dashboard" class="bottom-nav-item active">Loans</a>
            <a href="/customer/payment-history" class="bottom-nav-item">History</a>
            <a href="/customer/profile" class="bottom-nav-item">Profile</a>
        </div>
    </nav>

    <script src="/js/common.js"></script>
    <script src="/js/dashboard.js"></script>
    <script>
        if (!requireAuth()) { /* redirects */ }

        var pathParts = window.location.pathname.split('/');
        var loanId = pathParts[pathParts.length - 1];

        async function loadCustomerLoanDetail() {
            try {
                var data = await apiCall('/api/customer/loans/' + loanId, 'GET');
                var loan = data.loan;
                var payments = data.payments || [];

                var html = '';

                // Seizure Warning
                if (loan.seizureWarningShown) {
                    html += '<div class="seizure-warning">' +
                        '<div class="warning-text"><h4>Gold Seizure Warning</h4>' +
                        '<p>This loan is 30+ days overdue. Your <strong>' + loan.goldItemType + '</strong> (' + loan.goldWeight + 'g) will be seized. Contact the shop immediately.</p></div></div>';
                }

                html += '<div class="card mb-6"><div class="card-header"><h3>' + loan.loanId + '</h3>' + getStatusBadge(loan.status) + '</div>';
                html += '<div class="detail-grid">';
                html += '<div class="detail-group"><div class="detail-label">Gold Item</div><div class="detail-value">' + loan.goldItemType + ' — ' + loan.goldWeight + 'g (' + loan.goldPurity + ')</div></div>';
                html += '<div class="detail-group"><div class="detail-label">Loan Amount</div><div class="detail-value large">' + formatCurrency(loan.loanAmount) + '</div></div>';
                html += '<div class="detail-group"><div class="detail-label">Interest Rate</div><div class="detail-value">' + loan.interestRate + '% / month</div></div>';
                html += '<div class="detail-group"><div class="detail-label">Daily Interest</div><div class="detail-value">' + formatCurrency(loan.dailyInterestAmount) + '</div></div>';
                html += '<div class="detail-group"><div class="detail-label">Loan Date</div><div class="detail-value">' + formatDate(loan.loanDate) + '</div></div>';
                html += '<div class="detail-group"><div class="detail-label">Due Date</div><div class="detail-value">' + formatDate(loan.dueDate) + '</div></div>';
                html += '<div class="detail-group"><div class="detail-label">Total Interest Accrued</div><div class="detail-value text-warning">' + formatCurrency(loan.totalInterestAccrued) + '</div></div>';
                html += '<div class="detail-group"><div class="detail-label">Total Paid</div><div class="detail-value text-success">' + formatCurrency(loan.totalPaid) + '</div></div>';
                html += '<div class="detail-group"><div class="detail-label">Balance Due</div><div class="detail-value large text-danger">' + formatCurrency(loan.balanceDue) + '</div></div>';
                html += '</div></div>';

                // Pay Now button
                if (loan.status === 'ACTIVE' || loan.status === 'OVERDUE') {
                    html += '<a href="/customer/pay/' + loan.id + '" class="btn btn-gold btn-lg btn-block mb-6">Pay Now</a>';
                }

                // Payment History
                html += '<div class="section-card"><div class="section-header"><h3>Payment History</h3></div><div class="section-body">';
                if (payments.length === 0) {
                    html += '<p class="text-muted text-center p-4">No payments recorded.</p>';
                } else {
                    html += '<table class="data-table data-table-responsive"><thead><tr><th>Date</th><th>Mode</th><th>Amount</th><th>Receipt</th></tr></thead><tbody>';
                    payments.forEach(function(p) {
                        html += '<tr><td data-label="Date">' + formatDate(p.paymentDate) + '</td>' +
                            '<td data-label="Mode"><span class="payment-mode ' + (p.paymentMode === 'CASH' ? 'cash' : 'online') + '">' + p.paymentMode + '</span></td>' +
                            '<td data-label="Amount" class="td-amount">' + formatCurrency(p.amount) + '</td>' +
                            '<td data-label="Receipt">' + (p.receiptNumber ? '<button type="button" onclick="authenticatedDownload(\'/api/customer/payments/' + p.id + '/receipt\', \'receipt-' + p.receiptNumber + '.pdf\')" class="btn btn-sm btn-outline">Download</button>' : '—') + '</td></tr>';
                    });
                    html += '</tbody></table>';
                }
                html += '</div></div>';

                document.getElementById('customerLoanDetail').innerHTML = html;
            } catch (error) {
                showToast('Failed to load loan detail.', 'danger');
            }
        }

        loadCustomerLoanDetail();
    </script>
</body>
</html>
