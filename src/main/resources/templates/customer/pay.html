<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pay Now — Trust Ledger</title>
    <link rel="icon" href="/images/favicon.png" type="image/png">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="/css/forms.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand"><img src="/images/logo-dark.png" alt="Trust Ledger"><span>Pay Now</span></div>
        <div class="navbar-menu"><button class="btn btn-outline" onclick="logout()">Logout</button></div>
    </nav>

    <div class="dashboard-layout">
        <aside class="sidebar">
            <nav class="sidebar-nav">
                <div class="sidebar-section-title">My Account</div>
                <a href="/customer/dashboard"><span class="nav-icon">📊</span> My Loans</a>
                <a href="/customer/payment-history"><span class="nav-icon">📜</span> Payment History</a>
                <a href="/customer/profile"><span class="nav-icon">👤</span> Profile</a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <div>
                    <a href="/customer/dashboard" class="text-sm" style="color:var(--gray-500);">← Back to My Loans</a>
                    <h1>💰 Make Payment</h1>
                </div>
            </div>

            <div id="payContent">
                <div class="loading-overlay"><div class="spinner spinner-lg"></div><p>Loading payment page...</p></div>
            </div>
        </main>
    </div>

    <nav class="bottom-nav">
        <div class="bottom-nav-items">
            <a href="/customer/dashboard" class="bottom-nav-item"><span class="nav-icon">📊</span> Loans</a>
            <a href="/customer/payment-history" class="bottom-nav-item"><span class="nav-icon">📜</span> History</a>
            <a href="/customer/profile" class="bottom-nav-item"><span class="nav-icon">👤</span> Profile</a>
        </div>
    </nav>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="/js/common.js"></script>
    <script src="/js/payment.js"></script>
    <script>
        if (!requireAuth()) { /* redirects */ }
        var pathParts = window.location.pathname.split('/');
        var loanId = pathParts[pathParts.length - 1];
        initPayPage(loanId);
    </script>
</body>
</html>
