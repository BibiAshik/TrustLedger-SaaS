<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recent Payments - Trust Ledger</title>
    <link rel="icon" href="/images/favicon.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-brand">
            <img src="/images/logo-dark.png" alt="Trust Ledger">
        </div>
        <div class="navbar-menu">
            <button class="btn btn-outline" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <nav class="sidebar-nav">
                <div class="sidebar-section-title">Overview</div>
                <a href="/shop/dashboard"><span class="nav-icon">📊</span> Dashboard</a>
                
                <div class="sidebar-section-title">Customers</div>
                <a href="/shop/customers"><span class="nav-icon">👤</span> All Customers</a>
                <a href="/shop/add-customer"><span class="nav-icon">➕</span> Add Customer</a>
                
                <div class="sidebar-section-title">Loans</div>
                <a href="/shop/loans"><span class="nav-icon">📋</span> All Loans</a>
                <a href="/shop/create-loan"><span class="nav-icon">➕</span> Create Loan</a>
                <a href="/shop/overdue-loans"><span class="nav-icon">⚠️</span> Overdue Loans</a>
                
                <div class="sidebar-section-title">Account</div>
                <a href="/shop/settings"><span class="nav-icon">⚙️</span> Settings</a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <div>
                    <a href="/shop/dashboard" class="text-sm" style="color:var(--gray-500);">← Back to Dashboard</a>
                    <h1>Recent Payments</h1>
                </div>
            </div>

            <div class="card">
                <div id="allRecentPaymentsList">
                    <div class="loading-overlay"><div class="spinner"></div></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Mobile Bottom Nav -->
    <nav class="bottom-nav">
        <div class="bottom-nav-items">
            <a href="/shop/dashboard" class="bottom-nav-item"><span class="nav-icon">📊</span> Home</a>
            <a href="/shop/customers" class="bottom-nav-item"><span class="nav-icon">👤</span> Customers</a>
            <a href="/shop/loans" class="bottom-nav-item"><span class="nav-icon">📋</span> Loans</a>
            <a href="/shop/settings" class="bottom-nav-item"><span class="nav-icon">⚙️</span> Settings</a>
        </div>
    </nav>

    <script src="/js/common.js"></script>
    <script src="/js/dashboard.js"></script>
    <script>
        if (!requireAuth()) { /* redirects */ }
        // Dashboard JS will automatically populate allRecentPaymentsList
        loadShopDashboard();
    </script>
</body>
</html>
