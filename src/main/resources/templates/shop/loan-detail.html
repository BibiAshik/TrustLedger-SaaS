<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Detail — Trust Ledger</title>
    <link rel="icon" href="/images/favicon.png" type="image/png">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="/css/tables.css">
    <link rel="stylesheet" href="/css/forms.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand"><img src="/images/logo-light.png" alt="Trust Ledger"><span>My Shop</span></div>
        <div class="navbar-menu"><button onclick="logout()">Logout</button></div>
    </nav>

    <div class="dashboard-layout">
        <aside class="sidebar">
            <nav class="sidebar-nav">
                <div class="sidebar-section-title">Overview</div>
                <a href="/shop/dashboard"><span class="nav-icon">📊</span> Dashboard</a>
                <div class="sidebar-section-title">Customers</div>
                <a href="/shop/customers"><span class="nav-icon">👤</span> All Customers</a>
                <a href="/shop/add-customer"><span class="nav-icon">➕</span> Add Customer</a>
                <div class="sidebar-section-title">Loans</div>
                <a href="/shop/loans" class="active"><span class="nav-icon">📋</span> All Loans</a>
                <a href="/shop/create-loan"><span class="nav-icon">➕</span> Create Loan</a>
                <a href="/shop/overdue-loans"><span class="nav-icon">⚠️</span> Overdue Loans</a>
                <div class="sidebar-section-title">Account</div>
                <a href="/shop/settings"><span class="nav-icon">⚙️</span> Settings</a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <div>
                    <a href="/shop/loans" class="text-sm" style="color:var(--gray-500);">← Back to Loans</a>
                    <h1>Loan Detail</h1>
                </div>
            </div>

            <div id="loanDetailContent">
                <div class="loading-overlay"><div class="spinner spinner-lg"></div><p>Loading loan details...</p></div>
            </div>
        </main>
    </div>

    <script src="/js/common.js"></script>
    <script src="/js/dashboard.js"></script>
    <script>
        if (!requireAuth()) { /* redirects */ }
        var pathParts = window.location.pathname.split('/');
        var loanId = pathParts[pathParts.length - 1];
        loadLoanDetail(loanId);
    </script>
</body>
</html>
