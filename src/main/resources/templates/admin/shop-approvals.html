<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shops - Trust Ledger Admin</title>
    <link rel="icon" href="/images/favicon.png" type="image/png">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="/css/tables.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">
            <img src="/images/logo-dark.png" alt="Trust Ledger">
            <span>Admin Panel</span>
        </div>
        <div class="navbar-menu">
            <span class="text-sm text-muted">Super Admin</span>
            <button class="btn btn-outline" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="dashboard-layout">
        <aside class="sidebar">
            <nav class="sidebar-nav">
                <div class="sidebar-section-title">Overview</div>
                <a href="/admin/dashboard"><span class="nav-icon">📊</span> Dashboard</a>

                <div class="sidebar-section-title">Shop Management</div>
                <a href="/admin/shop-approvals" id="pendingApprovalsNav" class="active">
                    <span class="nav-icon">⏳</span> Pending Approvals
                </a>
                <a href="/admin/shops" id="allShopsNav">
                    <span class="nav-icon">🏪</span> All Shops
                </a>

                <div class="sidebar-section-title">Revenue</div>
                <a href="/admin/subscriptions"><span class="nav-icon">💰</span> Subscription Revenue</a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <div>
                    <h1 id="shopListTitle">Pending Shop Approvals</h1>
                    <p id="shopListSubtitle" class="breadcrumb">Review and approve new shop registrations</p>
                </div>
            </div>

            <div id="shopListContent">
                <div class="loading-overlay">
                    <div class="spinner spinner-lg"></div>
                    <p>Loading shops...</p>
                </div>
            </div>
            
            <div id="paginationControls" class="pagination-container mt-4"></div>
        </main>
    </div>

    <nav class="bottom-nav">
        <div class="bottom-nav-items">
            <a href="/admin/dashboard" class="bottom-nav-item"><span class="nav-icon">📊</span> Dashboard</a>
            <a href="/admin/shop-approvals" id="pendingApprovalsBottomNav" class="bottom-nav-item active">
                <span class="nav-icon">⏳</span> Approvals
            </a>
            <a href="/admin/shops" id="allShopsBottomNav" class="bottom-nav-item">
                <span class="nav-icon">🏪</span> Shops
            </a>
            <a href="/admin/subscriptions" class="bottom-nav-item"><span class="nav-icon">💰</span> Revenue</a>
        </div>
    </nav>

    <script src="/js/common.js"></script>
    <script src="/js/dashboard.js"></script>
    <script>
        if (!requireAuth()) { /* redirects */ }

        if (window.location.pathname === '/admin/shops') {
            document.getElementById('shopListTitle').textContent = 'All Shops';
            document.getElementById('shopListSubtitle').textContent = 'View and manage every registered shop';
            document.getElementById('pendingApprovalsNav').classList.remove('active');
            document.getElementById('allShopsNav').classList.add('active');
            document.getElementById('pendingApprovalsBottomNav').classList.remove('active');
            document.getElementById('allShopsBottomNav').classList.add('active');
            loadAllShops(0);
        } else {
            loadPendingShops(0);
        }
    </script>
</body>
</html>
