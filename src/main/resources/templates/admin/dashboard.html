<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard — Trust Ledger</title>
    <link rel="icon" href="/images/favicon.png" type="image/png">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="/css/tables.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-brand">
            <img src="/images/logo-light.png" alt="Trust Ledger">
            <span>Admin Panel</span>
        </div>
        <div class="navbar-menu">
            <span class="text-sm text-muted">Super Admin</span>
            <button onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <nav class="sidebar-nav">
                <div class="sidebar-section-title">Overview</div>
                <a href="/admin/dashboard" class="active">
                    <span class="nav-icon">📊</span> Dashboard
                </a>

                <div class="sidebar-section-title">Shop Management</div>
                <a href="/admin/shop-approvals">
                    <span class="nav-icon">⏳</span> Pending Approvals
                </a>
                <a href="/admin/shops">
                    <span class="nav-icon">🏪</span> All Shops
                </a>

                <div class="sidebar-section-title">Revenue</div>
                <a href="/admin/subscriptions">
                    <span class="nav-icon">💰</span> Subscription Revenue
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="page-header">
                <div>
                    <h1>Platform Dashboard</h1>
                    <p class="breadcrumb">Overview of the entire Trust Ledger platform</p>
                </div>
            </div>

            <!-- Stats Grid -->
            <div id="statsGrid" class="stats-grid">
                <!-- Populated by dashboard.js → loadAdminDashboard() -->
            </div>

            <div id="dashboardContent">
                <div class="loading-overlay">
                    <div class="spinner spinner-lg"></div>
                    <p>Loading dashboard...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Mobile Bottom Nav -->
    <nav class="bottom-nav">
        <div class="bottom-nav-items">
            <a href="/admin/dashboard" class="bottom-nav-item active">
                <span class="nav-icon">📊</span> Dashboard
            </a>
            <a href="/admin/shop-approvals" class="bottom-nav-item">
                <span class="nav-icon">⏳</span> Approvals
            </a>
            <a href="/admin/shops" class="bottom-nav-item">
                <span class="nav-icon">🏪</span> Shops
            </a>
            <a href="/admin/subscriptions" class="bottom-nav-item">
                <span class="nav-icon">💰</span> Revenue
            </a>
        </div>
    </nav>

    <script src="/js/common.js"></script>
    <script src="/js/dashboard.js"></script>
    <script>
        if (!requireAuth()) { /* redirects */ }
        loadAdminDashboard();
    </script>
</body>
</html>
