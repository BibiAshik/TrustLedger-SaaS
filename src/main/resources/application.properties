# =============================================================================
# TRUST LEDGER — APPLICATION CONFIGURATION (LOCAL DEVELOPMENT)
# =============================================================================
# This file contains configuration for running TrustLedger locally.
# For production/Railway deployment, these values would come from
# environment variables instead of being hardcoded here.
#
# IMPORTANT: This file is committed to Git with PLACEHOLDER values.
# Your REAL secrets (MySQL password, Razorpay secret, Gmail app password)
# should go in application-local.properties (which is gitignored).
# =============================================================================

# ----- Application Name -----
spring.application.name=TrustLedger-SaaS
spring.profiles.active=local

# Load application-local.properties automatically on your laptop.
# That file contains your private local credentials and overrides the safe
# placeholder defaults below.
# (To activate local profile, run with: -Dspring-boot.run.profiles=local)

# =============================================================================
# DATABASE CONFIGURATION (MySQL)
# =============================================================================
# The database "trustledger_saas" must be created manually in your local MySQL:
#   CREATE DATABASE trustledger_saas;
# Spring Boot connects to it using JDBC. JPA auto-generates all tables.

spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:trustledger_saas}?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================================================
# JPA / HIBERNATE CONFIGURATION
# =============================================================================
# ddl-auto=update: Hibernate automatically creates/updates tables based on
# entity classes. NEVER write manual CREATE TABLE SQL statements.
# show-sql=true: Logs all SQL queries to console — helpful for debugging.

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =============================================================================
# JWT CONFIGURATION
# =============================================================================
# Secret key: Used to sign and verify JWT tokens. Must be a long, random string.
# Expiry: Token validity duration in milliseconds (86400000 = 24 hours).
# NEVER hardcode these values directly in Java code — always read from here.

jwt.secret=${JWT_SECRET:TrustLedgerSaaSSecretKeyForJWTTokenGeneration2026ThisMustBeAtLeast256BitsLong}
jwt.expiration=604800000

# =============================================================================
# GMAIL SMTP CONFIGURATION (for EmailService)
# =============================================================================
# Uses Gmail's SMTP server to send real emails (reminders, receipts, etc.).
# You need to generate a Gmail "App Password" (not your regular Gmail password):
#   1. Go to myaccount.google.com → Security → 2-Step Verification → App passwords
#   2. Generate a new app password for "Mail"
#   3. Paste it below (or in application-local.properties)

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=trustledger.app@gmail.com
spring.mail.password=${MAIL_PASSWORD:PASTE_YOUR_APP_PASSWORD_HERE}

# Enable STARTTLS encryption (required by Gmail)
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# =============================================================================
# RAZORPAY CONFIGURATION (Test Mode)
# =============================================================================
# Test mode keys — no real money is processed.
# The Key Secret must be pasted by you (never committed to Git).

razorpay.key.id=${RAZORPAY_KEY_ID:rzp_test_T4fJ5573E5tC0t}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:An5ntByCIXtwanYVbVqpUOCe}

# =============================================================================
# SMS CONFIGURATION (simulated until a real provider is connected)
# =============================================================================
# SMS is sent through SmsService. Today it logs messages instead of calling an API.
# When you get a real SMS plan (Fast2SMS, MSG91, Twilio, etc.):
#   1. Add your API key below
#   2. Update sendSms() in SmsService.java with the provider HTTP call
#   3. Register DLT templates for India (credentials + reminder messages)
# No other class needs to change.

sms.enabled=false
sms.provider=simulated
sms.api.key=${SMS_API_KEY:}

# =============================================================================
# FILE UPLOAD CONFIGURATION
# =============================================================================
# Maximum file size for uploads (Aadhaar photos, PAN, owner photo, etc.)
# Files are stored locally on the server filesystem.

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# Local directory where uploaded files will be stored
# This folder will be auto-created if it doesn't exist
app.upload.dir=uploads

# =============================================================================
# SUPER ADMIN SEED CONFIGURATION
# =============================================================================
# These credentials are used to create the one-and-only Super Admin account
# on first application boot. Change the password after first login.

app.superadmin.email=admin@trustledger.com
app.superadmin.password=Admin@123
app.superadmin.name=Trust Ledger Admin

# =============================================================================
# THYMELEAF CONFIGURATION
# =============================================================================
# Disable caching during development so template changes show immediately
spring.thymeleaf.cache=false

# =============================================================================
# SERVER CONFIGURATION
# =============================================================================
server.port=${PORT:8080}

# =============================================================================
# LOGGING
# =============================================================================
logging.level.com.trustledgersaas=DEBUG
logging.level.org.springframework.security=DEBUG